# Local dev inside Docker — installs + node_modules stay in container-mounted volume unless you wipe volume.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command:
      ["yarn", "dev", "--hostname", "0.0.0.0", "--port", "3000"]
