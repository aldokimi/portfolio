name = "github-issue-circleci-trigger"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Non-secret config (edit before deploy)
[vars]
GH_ORG = "YOUR_GITHUB_USERNAME_OR_ORG"
GH_REPO = "portfolio"
BUILD_BRANCH = "main"

# Set via: wrangler secret put GITHUB_WEBHOOK_SECRET
#          wrangler secret put CIRCLE_API_TOKEN
# (GITHUB_WEBHOOK_SECRET = same secret you configure in GitHub repo webhook)
