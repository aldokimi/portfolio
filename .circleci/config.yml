# https://circleci.com/docs/configuration-reference/
version: 2.1

parameters:
  # Set to true when triggering via API (e.g. GitHub Issues webhook → Worker).
  issue_refresh:
    type: boolean
    default: false

jobs:
  build_and_deploy:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Build static export
          command: |
            export PORTFOLIO_REPO="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
            npm run build
      - run:
          name: Deploy to Cloudflare Pages
          command: npx wrangler@4 pages deploy out --project-name="${CLOUDFLARE_PAGES_PROJECT_NAME}"

workflows:
  build_on_push:
    when:
      equal: [false, << pipeline.parameters.issue_refresh >>]
    jobs:
      - build_and_deploy:
          filters:
            branches:
              only: main

  build_on_issue_webhook:
    when:
      equal: [true, << pipeline.parameters.issue_refresh >>]
    jobs:
      - build_and_deploy
