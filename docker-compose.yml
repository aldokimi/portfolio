# Local dev inside Docker — node_modules in a named volume (isolated from host OS).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: portfolio-app:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command:
      ["yarn", "dev", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  node_modules:
